  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Is Nooka free to use?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes! Nooka has a free plan that never expires. You get pantry tracking, a barcode scanner, manual grocery lists, and 5 smart recipe suggestions per week — no credit card needed. Paid plans start at $9.99/month when you're ready for more."
        }
      },
      {
        "@type": "Question",
        "name": "Is my family's data stored in Canada?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Always. Your data lives on Canadian servers and never crosses the border. We follow federal PIPEDA and BC PIPA privacy laws — because your family's information should stay where you are."
        }
      },
      {
        "@type": "Question",
        "name": "How does the recipe suggestion work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Nooka looks at what's already in your pantry, checks each family member's dietary needs and health goals, and suggests meals you can actually make tonight. No random recipes you don't have ingredients for."
        }
      },
      {
        "@type": "Question",
        "name": "Can I track allergens for my kids?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes — each family member gets their own profile where you can set allergens, dietary restrictions, and health goals. Nooka filters every recipe suggestion around those automatically. Nothing slips through."
        }
      },
      {
        "@type": "Question",
        "name": "Does Nooka work for the whole family?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yep. You can add up to 5 family members on the free plan. Each person gets their own health profile, and Nooka balances everyone's needs when suggesting meals — picky eaters, allergies, and all."
        }
      },
      {
        "@type": "Question",
        "name": "How do food recall alerts work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Nooka checks your pantry against live Health Canada recall notices automatically. If something you have gets recalled, you'll get an alert right away. No more finding out from the news three days later."
        }
      },
      {
        "@type": "Question",
        "name": "Can I cancel my subscription anytime?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Absolutely — no contracts, no cancellation fees. Cancel from your account settings in seconds. You keep access until the end of your billing period and your data stays safe either way."
        }
      },
      {
        "@type": "Question",
        "name": "What's the difference between Family and Premium?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Family adds smart grocery lists, predictive shopping, and pantry pattern insights on top of the free plan. Premium goes further with a full weekly meal planner, voice input, photo scanning, kids nutrition tracking, and more. Both are month-to-month with no commitment."
        }
      }
    ]
  }
  </script>

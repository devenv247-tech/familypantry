<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px;
  height: 844px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: #ffffff;
}

.splash {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  background: linear-gradient(160deg, #f0f7ff 0%, #ffffff 40%, #f5f0ff 100%);
  overflow: hidden;
}

/* Soft background blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0;
  animation: blobIn 1.2s ease forwards;
}
.blob-1 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #93c5fd, transparent);
  top: -80px; left: -80px;
  animation-delay: 0.1s;
}
.blob-2 {
  width: 250px; height: 250px;
  background: radial-gradient(circle, #c4b5fd, transparent);
  bottom: 0px; right: -60px;
  animation-delay: 0.3s;
}
.blob-3 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, #bbf7d0, transparent);
  bottom: 200px; left: -40px;
  animation-delay: 0.2s;
}

@keyframes blobIn {
  to { opacity: 1; }
}

/* Floating food particles */
.particle {
  position: absolute;
  font-size: 28px;
  opacity: 0;
  animation: floatUp 3s ease-in-out infinite;
}
.p1 { left: 8%;  top: 75%; animation-delay: 0.8s;  animation-duration: 3.5s; }
.p2 { left: 82%; top: 70%; animation-delay: 1.2s;  animation-duration: 3s; }
.p3 { left: 15%; top: 20%; animation-delay: 1.6s;  animation-duration: 4s; }
.p4 { left: 75%; top: 18%; animation-delay: 2.0s;  animation-duration: 3.2s; }
.p5 { left: 50%; top: 82%; animation-delay: 1.0s;  animation-duration: 3.8s; }
.p6 { left: 88%; top: 45%; animation-delay: 1.4s;  animation-duration: 2.8s; }
.p7 { left: 3%;  top: 48%; animation-delay: 1.8s;  animation-duration: 3.6s; }

@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(20px) rotate(-10deg) scale(0.7); }
  20%  { opacity: 0.7; }
  80%  { opacity: 0.5; }
  100% { opacity: 0; transform: translateY(-40px) rotate(10deg) scale(1.1); }
}

/* Logo container */
.logo-wrap {
  position: relative;
  margin-bottom: 32px;
  opacity: 0;
  animation: logoIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
}

@keyframes logoIn {
  from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* Pulse ring behind logo */
.pulse-ring {
  position: absolute;
  width: 120px; height: 120px;
  border-radius: 30px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(37, 99, 235, 0.12);
  animation: pulse 2s ease-in-out 1s infinite;
}
.pulse-ring-2 {
  position: absolute;
  width: 130px; height: 130px;
  border-radius: 33px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(37, 99, 235, 0.06);
  animation: pulse 2s ease-in-out 1.3s infinite;
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0; }
}

.logo-icon {
  width: 100px; height: 100px;
  border-radius: 26px;
  background: linear-gradient(145deg, #2563eb, #1d4ed8);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow: 0 20px 60px rgba(37, 99, 235, 0.35), 0 4px 16px rgba(0,0,0,0.08);
}

.logo-icon svg { width: 60px; height: 60px; }

/* Text */
.app-name {
  font-size: 42px;
  font-weight: 800;
  color: #111827;
  letter-spacing: -1.5px;
  opacity: 0;
  animation: textIn 0.6s ease 0.7s forwards;
}

@keyframes textIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.tagline {
  font-size: 16px;
  color: #6b7280;
  font-weight: 400;
  letter-spacing: 0.2px;
  margin-top: 8px;
  opacity: 0;
  animation: textIn 0.6s ease 0.9s forwards;
}

/* Loading dots */
.dots {
  display: flex; gap: 8px;
  margin-top: 60px;
  opacity: 0;
  animation: textIn 0.4s ease 1.2s forwards;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #2563eb;
  animation: dotBounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.15s; background: #7c3aed; }
.dot:nth-child(3) { animation-delay: 0.3s;  background: #34d399; }

@keyframes dotBounce {
  0%, 100% { transform: translateY(0); opacity: 0.4; }
  50% { transform: translateY(-8px); opacity: 1; }
}

/* Maple leaf subtle watermark */
.maple {
  position: absolute;
  bottom: 48px;
  font-size: 13px;
  color: #9ca3af;
  letter-spacing: 1px;
  opacity: 0;
  animation: textIn 0.5s ease 1.4s forwards;
}
</style>
</head>
<body>
<div class="splash">
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Floating food particles using SVG icons -->
  <div class="particle p1">🥕</div>
  <div class="particle p2">🍅</div>
  <div class="particle p3">🥦</div>
  <div class="particle p4">🍋</div>
  <div class="particle p5">🥑</div>
  <div class="particle p6">🧄</div>
  <div class="particle p7">🫐</div>

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="pulse-ring-2"></div>
    <div class="pulse-ring"></div>
    <div class="logo-icon">
      <svg viewBox="0 0 60 60" fill="none">
        <rect x="12" y="13" width="7" height="28" rx="3.5" fill="white"/>
        <rect x="41" y="13" width="7" height="28" rx="3.5" fill="white"/>
        <rect x="15" y="17" width="21" height="7" rx="3.5" fill="white" transform="rotate(30 15 17)"/>
        <circle cx="49" cy="10" r="6" fill="#34d399"/>
        <circle cx="49" cy="10" r="3.5" fill="white" opacity="0.9"/>
      </svg>
    </div>
  </div>

  <!-- Text -->
  <div class="app-name">Nooka</div>
  <div class="tagline">Meal planning for Canadian families</div>

  <!-- Loading dots -->
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Bottom -->
  <div class="maple">🍁 Made for Canada</div>
</div>
</body>
</html>
